<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Круг ролей</title>
<style>
  :root{
    --bg: #0f1117; --panel: #181b25; --panel-border: #2a2e3d;
    --accent: #6c8cff; --accent2: #ff6c9c; --accent3: #ffb347;
    --text: #e7e9f0; --muted: #8b8fa3;
    --cat-citizen: #5b9cf6;
    --cat-outcast:  #7ec8f7;
    --cat-minion:  #ff6b6b;
    --cat-demon:   #e03030;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(circle at 50% 40%, #1a1d2a, #0b0c12 70%);
    color: var(--text);
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    overflow: hidden;
  }
  #app{ width:100%; height:100%; }

  /* ── бургер-кнопка ── */
  #burgerBtn{
    position:fixed; top:16px; left:16px; z-index:200;
    width:44px; height:44px; border-radius:12px;
    background:rgba(24,27,37,.92); border:1px solid var(--panel-border);
    backdrop-filter:blur(8px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:5px; cursor:pointer; padding:0; transition:background .2s;
  }
  #burgerBtn:hover{ background:rgba(108,140,255,.25); border-color:var(--accent); }
  #burgerBtn span{
    display:block; width:20px; height:2px;
    background:var(--text); border-radius:2px;
    transition:transform .3s, opacity .3s, width .3s;
    transform-origin:center;
  }
  /* крестик при открытом меню */
  body.menu-open #burgerBtn span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
  body.menu-open #burgerBtn span:nth-child(2){ opacity:0; width:0; }
  body.menu-open #burgerBtn span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

  /* ── оверлей-затемнение ── */
  #overlay{
    position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,.55); backdrop-filter:blur(2px);
    opacity:0; pointer-events:none;
    transition:opacity .3s;
  }
  body.menu-open #overlay{ opacity:1; pointer-events:all; }

  /* ── боковая панель ── */
  #sidebar{
    position:fixed; top:0; left:0; height:100%; z-index:150;
    width:320px; background:var(--panel);
    border-right:1px solid var(--panel-border);
    padding:70px 18px 18px; overflow-y:auto;
    transform:translateX(-100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 32px rgba(0,0,0,.5);
  }
  body.menu-open #sidebar{ transform:translateX(0); }

  #sidebar h2{ margin:0 0 14px; font-size:18px; }
  .section{
    margin-bottom:20px; padding-bottom:16px;
    border-bottom:1px solid var(--panel-border);
  }
  .section label{
    display:block; font-size:12px; color:var(--muted);
    margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px;
  }
  .row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
  input[type=number], input[type=range], input[type=text], textarea, select{
    width:100%; background:#0e1018; border:1px solid var(--panel-border);
    color:var(--text); border-radius:6px; padding:8px;
    font-size:13px; font-family:inherit;
  }
  textarea{ resize:vertical; min-height:90px; }
  button{
    background:var(--accent); color:#0b0c12; border:none;
    padding:9px 12px; border-radius:6px; cursor:pointer;
    font-weight:600; font-size:13px; transition:filter .15s;
  }
  button:hover{ filter:brightness(1.1); }
  button.secondary{ background:transparent; border:1px solid var(--panel-border); color:var(--text); }
  button.danger{ background:var(--accent2); color:#1a0a10; }
  .full{ width:100%; }
  .hint{ font-size:11px; color:var(--muted); line-height:1.4; margin-top:4px; }

  .item-row{
    display:flex; align-items:center; gap:8px;
    background:#0e1018; border:1px solid var(--panel-border);
    border-radius:6px; padding:6px; margin-bottom:6px;
  }
  .item-row img{ width:30px; height:30px; border-radius:50%; object-fit:cover; background:#222; flex-shrink:0; }
  .item-row input[type=text]{ flex:1; padding:5px 7px; font-size:12px; }
  .item-row button{ padding:5px 7px; font-size:11px; flex-shrink:0; }
  #itemsList, #tagsList{ max-height:200px; overflow-y:auto; margin-bottom:10px; }

  /* ── сцена ── */
  #stage{
    width:100%; height:100%; position:relative;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  #circleWrap{ position:relative; width:1px; height:1px; }
  #circleRing{
    position:absolute; top:0; left:0; transition:none;
    /* CSS-переменные масштаба, выставляются из JS */
    --av: 68px;   /* размер аватара */
    --iw: 110px;  /* ширина элемента */
    --fs: 11px;   /* базовый шрифт */
    --gap: 5px;   /* зазор между строками */
    --bd: 22px;   /* размер бейджа */
  }
  .ring-guide{
    position:absolute; inset:0; border:1px dashed rgba(255,255,255,.08);
    border-radius:50%; pointer-events:none;
  }
  .center-dot{
    position:absolute; width:8px; height:8px; background:var(--accent);
    border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%);
    box-shadow:0 0 18px 4px rgba(108,140,255,.6); pointer-events:none;
  }

  /* ── элемент на круге ── */
  .circle-item{ position:absolute; top:50%; left:50%; width:0; height:0; }
  .circle-item .item-inner{
    position:absolute;
    width: var(--iw);
    transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center;
    gap: var(--gap);
    user-select:none;
  }

  /* ── аватар ── */
  .avatar-box{ position:relative; display:inline-block; }
  .avatar-box img{
    width: var(--av); height: var(--av);
    border-radius:50%; object-fit:cover;
    background:#222; border:2px solid var(--panel-border);
    box-shadow:0 4px 14px rgba(0,0,0,.5);
    transition:transform .15s, border-color .15s;
    display:block;
  }
  .circle-item:hover .avatar-box img{ transform:scale(1.06); border-color:var(--accent); }

  /* ── бейдж номера ── */
  .slot-number-badge{
    position:absolute; top:-5px; right:-5px;
    width: var(--bd); height: var(--bd); border-radius:50%;
    background:var(--accent); color:#0b0c12;
    font-weight:700;
    font-size: calc(var(--bd) * 0.5);
    display:flex; align-items:center; justify-content:center;
    border:2px solid #0b0c12; z-index:2;
  }

  /* ── кнопка убийства ── */
  .kill-btn{
    position:absolute; bottom:-5px; left:-5px;
    width: var(--bd); height: var(--bd); border-radius:50%;
    background:#1a1d2a; border:2px solid var(--panel-border);
    color:var(--text);
    font-size: calc(var(--bd) * 0.5);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; padding:0; z-index:3;
  }
  .kill-btn:hover{ filter:brightness(1.3); }
  .circle-item.dead .kill-btn{ background:var(--accent2); border-color:var(--accent2); color:#1a0a10; }

  /* ── мёртвые ── */
  .circle-item.dead .avatar-box,
  .circle-item.dead .role-select,
  .circle-item.dead .tags-area{
    filter:grayscale(1) brightness(.45);
    opacity:.5;
  }

  /* ── выбор роли ── */
  .role-select{
    width: var(--iw); font-size: var(--fs);
    text-align:center; text-align-last:center;
    color:var(--text); background:rgba(10,11,17,.9);
    border:1px solid var(--panel-border);
    padding:2px 4px; border-radius:10px; cursor:pointer;
    /* жирный шрифт чтобы лучше читалось */
    font-weight:600;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }

  /* ── теги ── */
  .tags-area{ width:var(--iw); display:flex; flex-direction:column; align-items:center; gap:3px; }
  .tags-pills{ display:flex; flex-wrap:wrap; gap:3px; justify-content:center; }
  .tag-pill{
    display:inline-flex; align-items:center; gap:2px;
    background:rgba(255,179,71,.18); border:1px solid var(--accent3);
    color:var(--accent3); font-weight:700;
    font-size: calc(var(--fs) - 1px);
    padding:1px 5px; border-radius:10px; white-space:nowrap;
    /* тень для читаемости на любом фоне */
    text-shadow: 0 1px 4px rgba(0,0,0,.9);
  }
  .tag-pill .remove-tag{
    background:none; border:none; color:var(--accent3);
    font-size: calc(var(--fs) - 1px); cursor:pointer;
    padding:0; line-height:1; font-weight:900; min-width:unset;
  }
  .tag-pill .remove-tag:hover{ filter:brightness(1.5); }

  /* компактный режим убран — теги всегда видны как текст */

  .add-tag-select{
    font-size: calc(var(--fs) - 1px); width:100%;
    text-align:center; text-align-last:center; color:var(--muted);
    background:rgba(10,11,17,.75); border:1px dashed var(--panel-border);
    padding:1px 3px; border-radius:8px; cursor:pointer;
  }

  /* ── панель управления ── */
  #rotateControls{
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    background:rgba(24,27,37,.85); border:1px solid var(--panel-border);
    border-radius:30px; padding:10px 18px;
    display:flex; align-items:center; gap:12px;
    backdrop-filter:blur(6px);
  }
  #rotateControls button{ padding:8px 14px; font-size:16px; }

  /* ── grid-режим: прямоугольник когда элементы выходят за экран ── */
  #circleWrap.grid-mode{
    width: auto; height: auto;
    max-width: calc(100vw - 40px);
  }
  #circleWrap.grid-mode .ring-guide,
  #circleWrap.grid-mode .center-dot{ display:none; }

  #circleRing.grid-mode{
    position:static !important;
    width:auto !important; height:auto !important;
    margin:0 !important;
    transform:none !important;
    display:flex; flex-wrap:wrap;
    justify-content:center; align-items:flex-start;
    gap:14px; padding:12px;
  }
  #circleRing.grid-mode .circle-item{
    position:static !important;
    width:auto; height:auto;
    transform:none !important;
  }
  #circleRing.grid-mode .circle-item .item-inner{
    position:static !important;
    transform:none !important;
    width:var(--iw);
  }
  /* индикатор режима */
  #layoutIndicator{
    position:fixed; top:16px; right:16px;
    background:rgba(24,27,37,.85); border:1px solid var(--panel-border);
    border-radius:8px; padding:5px 10px;
    font-size:11px; color:var(--muted);
    backdrop-filter:blur(6px);
    pointer-events:none;
    opacity:0; transition:opacity .3s;
  }
  #layoutIndicator.visible{ opacity:1; }

  /* кнопки поворота скрыты в rect-режиме, кнопки прямоугольника — в круговом */
  body.grid-mode #rotateControls .rotate-only{ opacity:.3; pointer-events:none; }
  .rect-only{ display:none !important; }
  body.grid-mode .rect-only{ display:block !important; }
  body.grid-mode .rect-only.row{ display:flex !important; }

  /* в прямоугольном режиме .circle-item позиционируется через left/top, а не через transform */
  #circleRing.rect-layout .circle-item{
    top: 0; left: 0; /* переопределяем 50%/50%; реальные координаты ставятся через inline-style */
  }
  /* направляющий контур: круг в ring-режиме, прямоугольник в rect-режиме */
  #circleRing.rect-layout ~ .ring-guide,
  .ring-guide.rect{
    border-radius: 12px;
  }
  /* точка в центре скрывается в rect-режиме */
  #circleRing.rect-layout ~ .center-dot,
  .center-dot.rect{ display:none; }
  body.locked .role-select{
    pointer-events:none;
    border-color:transparent;
    background:transparent;
    appearance:none; -webkit-appearance:none;
    opacity:.85;
    cursor:default;
  }
  body.locked .add-tag-select{ display:none !important; }
  body.locked .remove-tag{ display:none !important; }
  body.locked .kill-btn{ pointer-events:none; opacity:.5; }
  body.locked #burgerBtn{ pointer-events:none; opacity:.4; }
  /* кнопка лока подсвечивается когда активна */
  #lockBtn.active{
    background: var(--accent2);
    color: #1a0a10;
  }

  #rectBorder{
    position:absolute; pointer-events:none; z-index:50;
    border: 2px solid #00e676; border-radius: 10px;
    box-shadow: 0 0 12px rgba(0,230,118,.35);
    opacity:0; transition: opacity .2s;
    display:none;
  }
  body.grid-mode.menu-open #rectBorder{ display:block; opacity:1; }
  ::-webkit-scrollbar-thumb{ background:#2a2e3d; border-radius:4px; }

  /* ── drag-and-drop в rect-режиме ── */
  .circle-item.drag-over .avatar-box img{
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(108,140,255,.5), 0 4px 14px rgba(0,0,0,.5);
    transform: scale(1.1);
  }

  /* ── цвета категорий роли ── */
  .role-select.cat-citizen { color: var(--cat-citizen); border-color: rgba(91,156,246,.4); }
  .role-select.cat-outcast  { color: var(--cat-outcast);  border-color: rgba(126,200,247,.4); }
  .role-select.cat-minion  { color: var(--cat-minion);  border-color: rgba(255,107,107,.4); }
  .role-select.cat-demon   { color: var(--cat-demon);   border-color: rgba(224,48,48,.5); }
  /* dot-индикатор категории в списке ролей */
  .cat-dot{
    display:inline-block; width:10px; height:10px; border-radius:50%;
    flex-shrink:0; margin-right:2px;
  }
  .cat-dot.cat-citizen { background: var(--cat-citizen); }
  .cat-dot.cat-outcast  { background: var(--cat-outcast); }
  .cat-dot.cat-minion  { background: var(--cat-minion); }
  .cat-dot.cat-demon   { background: var(--cat-demon); }
  select.cat-select{
    flex-shrink:0; width:110px; font-size:11px;
    background:#0e1018; border:1px solid var(--panel-border);
    color:var(--text); border-radius:6px; padding:4px 5px;
  }

  /* ── двухшаговый выбор роли ── */
  .role-picker{
    position:relative;
    width: var(--iw);
  }
  .role-picker-btn{
    width:100%; font-size: var(--fs);
    text-align:center; color:var(--text);
    background:rgba(10,11,17,.9);
    border:1px solid var(--panel-border);
    padding:2px 4px; border-radius:10px; cursor:pointer;
    font-weight:600; text-shadow:0 1px 3px rgba(0,0,0,.8);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .role-picker-btn.cat-citizen{ color:var(--cat-citizen); border-color:rgba(91,156,246,.4); }
  .role-picker-btn.cat-outcast { color:var(--cat-outcast);  border-color:rgba(126,200,247,.4); }
  .role-picker-btn.cat-minion { color:var(--cat-minion);  border-color:rgba(255,107,107,.4); }
  .role-picker-btn.cat-demon  { color:var(--cat-demon);   border-color:rgba(224,48,48,.5); }

  .role-dropdown{
    position:fixed; z-index:9999;
    background:#1a1d2a; border:1px solid var(--panel-border);
    border-radius:10px; min-width:160px;
    box-shadow:0 8px 32px rgba(0,0,0,.7);
    overflow:hidden;
    display:none;
  }
  .role-dropdown.open{ display:block; }

  .role-dropdown-step{ padding:6px 0; }

  .role-dropdown-header{
    font-size:10px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.5px; padding:4px 10px 2px;
    display:flex; align-items:center; gap:6px; cursor:pointer;
  }
  .role-dropdown-header .back-arrow{ font-size:12px; }
  .role-dropdown-header:hover .back-arrow{ color:var(--accent); }

  .role-dropdown-cat-item, .role-dropdown-role-item{
    padding:5px 12px; cursor:pointer;
    font-size:12px; font-weight:600;
    display:flex; align-items:center; gap:7px;
    transition:background .12s;
  }
  .role-dropdown-cat-item:hover, .role-dropdown-role-item:hover{
    background:rgba(255,255,255,.07);
  }
  .role-dropdown-cat-item .cat-dot{ flex-shrink:0; }
  .role-dropdown-role-item.selected{ opacity:.5; }

  body.locked .role-picker-btn{
    pointer-events:none; border-color:transparent;
    background:transparent; opacity:.85; cursor:default;
  }
</style>
</head>
<body>
<div id="app">

  <!-- бургер-кнопка -->
  <button id="burgerBtn" aria-label="Меню настроек">
    <span></span><span></span><span></span>
  </button>

  <!-- затемнение фона -->
  <div id="overlay"></div>

  <aside id="sidebar">
    <h2>⚙ Настройки круга</h2>

    <div class="section">
      <label>Пресеты ролей</label>
      <div class="row">
        <select id="presetSelect" style="flex:1;">
          <option value="">— выбери пресет —</option>
        </select>
        <button id="presetLoadBtn" class="secondary">Загрузить</button>
      </div>
      <div id="presetStatus" class="hint"></div>
    </div>

    <div class="section">
      <label>Количество игроков</label>
      <div class="row">
        <input type="number" id="countInput" min="1" max="30" value="6">
        <button id="applyCount">Применить</button>
      </div>
      <div class="hint">Размер элементов и радиус автоматически подстраиваются под количество игроков.</div>
    </div>

    <div class="section">
      <label>Радиус круга (px)</label>
      <input type="range" id="radiusInput" min="100" max="700" value="260">
    </div>

    <div class="section">
      <label>Роли (с изображениями)</label>
      <div id="itemsList"></div>
      <div class="row">
        <button id="addItemBtn" class="secondary full">+ Добавить роль</button>
      </div>
      <div class="row">
        <label style="margin:0;flex:1;">
          <span style="display:block;margin-bottom:4px;font-size:11px;color:var(--muted);">Загрузить картинки — имя файла станет названием роли</span>
          <input type="file" id="fileInput" accept="image/*" multiple>
        </label>
      </div>
    </div>

    <div class="section">
      <label>Тэги / состояния</label>
      <div id="tagsList"></div>
      <div class="row">
        <button id="addTagBtn" class="secondary full">+ Добавить тэг</button>
      </div>
      <div class="hint">Каждому игроку можно назначить любое количество тэгов. При 10+ игроках тэги показываются в свёрнутом виде — наведите на игрока чтобы раскрыть.</div>
    </div>

    <div class="section">
      <label>Импорт / экспорт ролей (JSON)</label>
      <textarea id="jsonArea" placeholder='[{"name":"Шериф","img":"url или data:..."}, ...]'></textarea>
      <div class="row" style="margin-top:8px;">
        <button id="loadJsonBtn" class="secondary full">Загрузить</button>
        <button id="exportJsonBtn" class="secondary full">Выгрузить</button>
      </div>
    </div>

    <div class="section rect-only">
      <label>Размер прямоугольника</label>
      <div class="row" style="justify-content:space-between;">
        <span style="font-size:12px;color:var(--muted);min-width:60px;">Ширина</span>
        <button id="rectWMinus" class="secondary">◀ Меньше</button>
        <button id="rectWPlus"  class="secondary">Больше ▶</button>
      </div>
      <div class="row" style="justify-content:space-between;">
        <span style="font-size:12px;color:var(--muted);min-width:60px;">Высота</span>
        <button id="rectHMinus" class="secondary">▲ Меньше</button>
        <button id="rectHPlus"  class="secondary">Больше ▼</button>
      </div>
      <div class="row" style="justify-content:space-between;">
        <span style="font-size:12px;color:var(--muted);min-width:60px;">Позиция</span>
        <button id="rectYMinus" class="secondary">▲ Выше</button>
        <button id="rectYPlus"  class="secondary">Ниже ▼</button>
      </div>
    </div>

    <div class="section" style="border-bottom:none;">
      <button id="resetBtn" class="danger full">Сбросить к примеру</button>
    </div>
  </aside>

  <main id="stage">
    <div id="circleWrap">
      <div class="ring-guide"></div>
      <div class="center-dot"></div>
      <div id="circleRing"></div>
    </div>
    <div id="rotateControls">
      <button id="zoomOut" title="Уменьшить">−</button>
      <button id="zoomIn"  title="Увеличить">+</button>
      <div style="width:1px;height:24px;background:var(--panel-border);margin:0 2px;"></div>
      <button id="rotLeft"  class="rotate-only" title="Против часовой">⟲</button>
      <button id="rotRight" class="rotate-only" title="По часовой">⟳</button>
      <div style="width:1px;height:24px;background:var(--panel-border);margin:0 2px;"></div>
      <button id="lockBtn" title="Режим просмотра">🔓 Редактирование</button>
    </div>
    <div id="layoutIndicator">⬛ Прямоугольник</div>
    <div id="rectBorder"></div>
  </main>

</div>
<script>
(function(){

  function placeholderImg(letter){
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100">
      <rect width="100" height="100" fill="#2a2e3d"/>
      <text x="50" y="58" font-size="40" text-anchor="middle" fill="#8b8fa3" font-family="Arial">${letter}</text>
    </svg>`;
    return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
  }

  // ── масштаб в зависимости от числа игроков ──
  function scaleForCount(n){
    if(n <= 8)  return { av:68, iw:110, fs:11, bd:22, gap:5 };
    if(n <= 11) return { av:54, iw:90,  fs:10, bd:19, gap:4 };
    if(n <= 15) return { av:44, iw:76,  fs:9.5,bd:16, gap:3 };
                return { av:36, iw:64,  fs:9,  bd:14, gap:3 };
  }

  // минимальный радиус, чтобы элементы не перекрывались
  function minRadius(n, iw){
    if(n <= 1) return 0;
    return Math.ceil((iw + 18) * n / (2 * Math.PI));
  }

  // ── состояние ──

    { name:"Отравлен" }, { name:"Пьяница" },

  let count       = 6;
  let radius      = 260;
  let rotation    = 90;
  let currentSlot = 0;
  let assignments = [];
  let alive       = [];
  let slotTags    = [];
  let rectWOffset = 0;
  let rectHOffset = 0;
  let rectYOffset = 0; // смещение по вертикали (px, положительное = вниз)

  const itemsListEl   = document.getElementById('itemsList');
  const tagsListEl    = document.getElementById('tagsList');
  const countInput    = document.getElementById('countInput');

  const CATEGORIES = [
    { value:'citizen', label:'Горожанин' },

  function renderItemsList(){
    itemsListEl.innerHTML = '';
    pool.forEach((item, idx) => {

  function renderTagsList(){

  function syncState(n, source){
    const na=[], nl=[], nt=[];
    for(let i=0;i<n;i++){
      let v=assignments[i];
      if(v===undefined||v>=source.length) v=i%source.length;
      na.push(v);
      nl.push(alive[i]===undefined ? true : alive[i]);
      const ex = slotTags[i] instanceof Set ? slotTags[i] : new Set();
      nt.push(new Set([...ex].filter(ti=>ti<tagPool.length)));
    }
    assignments=na; alive=nl; slotTags=nt;
  }

  function renderCircle(){
    // убираем все висячие dropdown-ы
    document.querySelectorAll('.role-dropdown').forEach(d => d.remove());
    circleRing.innerHTML = '';

    const n = Math.max(1, count);
    const scale = scaleForCount(n);
    const source = pool.length ? pool : [{name:'—', img:placeholderImg('?')}];
    syncState(n, source);

    // размеры доступной области (с учётом панели кнопок снизу)
    const stageEl   = document.getElementById('stage');
    const SIDE_PAD  = 16;
    const TOP_PAD   = 16;
    const BOT_PAD   = 100; // панель кнопок ~70px + отступ
    const stageW    = stageEl.clientWidth;
    const stageH    = stageEl.clientHeight;
    const SW        = Math.max(100, stageW  - 2 * SIDE_PAD + rectWOffset);
    const SH        = Math.max(100, stageH  - TOP_PAD - BOT_PAD + rectHOffset);

    // смещение центра доступной зоны относительно центра stage
    const rectOffsetY = (TOP_PAD - BOT_PAD) / 2 + rectYOffset; // отрицательное → сдвиг вверх

    // минимальный радиус и запрошенный пользователем
    const rMin = minRadius(n, scale.iw);
    const r    = Math.max(radius, rMin);

    // поместится ли круг в доступной зоне?
    const circleReach = r + scale.iw / 2 + 12;
    const useRect = (circleReach * zoom > SW / 2) || (circleReach * zoom > SH / 2);

    // CSS-переменные масштаба
    circleRing.style.setProperty('--av', scale.av+'px');
    circleRing.style.setProperty('--iw', scale.iw+'px');
    circleRing.style.setProperty('--fs', scale.fs+'px');
    circleRing.style.setProperty('--bd', scale.bd+'px');
    circleRing.style.setProperty('--gap', scale.gap+'px');
    circleRing.classList.remove('compact');
    circleRing.classList.toggle('rect-layout', useRect);

    // обновляем форму направляющего контура и видимость центральной точки
    const guide     = document.querySelector('.ring-guide');
    const centerDot = document.querySelector('.center-dot');
    if(guide){
      if(useRect){
        guide.style.display = 'none';
      } else {
        guide.style.display = '';
        guide.style.borderRadius = '50%';
        guide.style.width  = '';
        guide.style.height = '';
        guide.style.top    = '';
        guide.style.left   = '';
        guide.style.inset  = '0';
      }
    }
    if(centerDot) centerDot.style.display = useRect ? 'none' : '';

    if(useRect){
      _renderRect(n, scale, source, SW, SH, rectOffsetY);
      // позиционируем зелёный контур поверх circleRing
      const rb = document.getElementById('rectBorder');
      const stageRect = stageEl.getBoundingClientRect();
      const ringLeft  = stageW / 2 - SW / 2;
      const ringTop   = stageH / 2 + rectOffsetY - SH / 2;
      rb.style.left   = ringLeft + 'px';
      rb.style.top    = ringTop  + 'px';
      rb.style.width  = SW + 'px';
      rb.style.height = SH + 'px';
    } else {
      _renderRing(n, scale, source, r);
      document.getElementById('rectBorder').style.opacity = '0';
    }

    // индикатор смены режима
    const wasRect = isGridMode;
    isGridMode = useRect;
    document.body.classList.toggle('grid-mode', useRect);
    if(wasRect !== useRect){
      const ind = document.getElementById('layoutIndicator');
      ind.textContent = useRect ? '⬛ Прямоугольник' : '⬤ Круг';
      ind.classList.add('visible');
      clearTimeout(ind._t);
      ind._t = setTimeout(() => ind.classList.remove('visible'), 2200);
    }

    // кнопки поворота — только в круговом режиме
    rotLeftBtn.disabled  = useRect;
    rotRightBtn.disabled = useRect;
    rotLeftBtn.style.opacity  = useRect ? '.3' : '';
    rotRightBtn.style.opacity = useRect ? '.3' : '';
  }

  // ── КРУГОВОЙ РЕЖИМ ──
  function _renderRing(n, scale, source, r){
    circleRing.style.width  = (r*2)+'px';
    circleRing.style.height = (r*2)+'px';
    circleRing.style.marginLeft = (-r)+'px';
    circleRing.style.marginTop  = (-r)+'px';
    circleRing.style.transform  = `rotate(${rotation}deg)`;

    for(let i=0; i<n; i++){
      const si = i;
      const angle = (360/n)*i;
      const wrap = _makeItem(source, si, n);
      wrap.style.transform = `rotate(${angle}deg) translate(${r}px) rotate(${-angle}deg)`;
      const inner = wrap.querySelector('.item-inner');
      inner.style.transform = `translate(-50%,-50%) rotate(${-rotation}deg)`;
      circleRing.appendChild(wrap);
    }
  }

  // ── ПРЯМОУГОЛЬНЫЙ РЕЖИМ ──
  function _renderRect(n, scale, source, SW, SH, offsetY){
    circleRing.style.width   = SW+'px';
    circleRing.style.height  = SH+'px';
    circleRing.style.marginLeft = (-SW/2)+'px';
    circleRing.style.marginTop  = (offsetY - SH/2)+'px';
    circleRing.style.transform  = 'none';

    // ── распределение по сторонам равномерно по периметру ──
    // Игроки расставляются через равные расстояния вдоль периметра,
    // со сдвигом на полшага — никогда не попадают ровно в углы.
    // Нет дублирования угловых позиций между соседними сторонами.

    // INNER — отступ от края прямоугольника до центра элемента
    const INNER = scale.iw / 2 + 20;
    const positions = [];

    const perimW = SW - 2 * INNER;
    const perimH = SH - 2 * INNER;
    const totalPerim = 2 * (perimW + perimH);

    for(let i = 0; i < n; i++){
      const dist = (totalPerim / n) * i + (totalPerim / n) * 0.5;
      let d = dist % totalPerim;
      let x, y;
      if(d < perimW){
        x = INNER + d; y = INNER;
      } else if(d < perimW + perimH){
        x = SW - INNER; y = INNER + (d - perimW);
      } else if(d < 2 * perimW + perimH){
        x = SW - INNER - (d - perimW - perimH); y = SH - INNER;
      } else {
        x = INNER; y = SH - INNER - (d - 2 * perimW - perimH);
      }
      positions.push({ x, y });
    }

    positions.forEach((pos, i) => {
      const wrap = _makeItem(source, i, n);
      wrap.style.top  = pos.y + 'px';
      wrap.style.left = pos.x + 'px';
      const inner = wrap.querySelector('.item-inner');
      // Центр элемента теперь всегда внутри прямоугольника — простой центрирующий transform
      inner.style.transform = 'translate(-50%,-50%)';
      initRectDrag(wrap, i);
      circleRing.appendChild(wrap);
    });
  }

  // ── общий DOM элемента слота ──
  function _makeItem(source, si, n){
    const data = source[assignments[si]];

    const wrap = document.createElement('div');
    wrap.className = 'circle-item'+(alive[si] ? '' : ' dead');
    wrap.dataset.slot = si;

    const inner = document.createElement('div');
    inner.className = 'item-inner';

    // аватар
    const avatarBox = document.createElement('div');
    avatarBox.className = 'avatar-box';

    const img = document.createElement('img');
    img.src=data.img; img.alt=data.name;
    avatarBox.appendChild(img);

    const badge = document.createElement('span');
    badge.className='slot-number-badge';
    badge.textContent=si+1;
    avatarBox.appendChild(badge);

    const killBtn = document.createElement('button');
    killBtn.type = 'button';
    killBtn.className='kill-btn';
    killBtn.textContent=alive[si]?'☠':'✓';
    killBtn.title=alive[si]?'Убить':'Оживить';
    killBtn.addEventListener('mousedown',e=>{ e.stopPropagation(); e.preventDefault(); });
    killBtn.addEventListener('click',e=>{
      e.stopPropagation();
      e.preventDefault();
      alive[si]=!alive[si];
      wrap.classList.toggle('dead',!alive[si]);
      killBtn.textContent=alive[si]?'☠':'✓';
      killBtn.title=alive[si]?'Убить':'Оживить';
    });
    avatarBox.appendChild(killBtn);

    // роль — двухшаговый пикер
    const pickerWrap = document.createElement('div');
    pickerWrap.className = 'role-picker';

    const pickerBtn = document.createElement('button');
    pickerBtn.type = 'button';
    pickerBtn.className = 'role-picker-btn cat-'+(source[assignments[si]]?.category||'citizen');
    pickerBtn.textContent = source[assignments[si]]?.name || '—';

    const dropdown = document.createElement('div');
    dropdown.className = 'role-dropdown';

    let pickerStep = 'cat'; // 'cat' | 'role'
    let pickerCat  = null;

    function getCategories(){
      const seen = new Set();
      return CATEGORIES.filter(c => {
        if(source.some(r=>(r.category||'citizen')===c.value)){ seen.add(c.value); return true; }
        return false;
      });
    }

    function buildDropdown(){
      dropdown.innerHTML = '';
      const step = document.createElement('div');
      step.className = 'role-dropdown-step';

      if(pickerStep === 'cat'){
        const hdr = document.createElement('div');
        hdr.className = 'role-dropdown-header';
        hdr.textContent = 'Выберите категорию';
        step.appendChild(hdr);
        getCategories().forEach(c => {
          const item = document.createElement('div');
          item.className = 'role-dropdown-cat-item';
          const dot = document.createElement('span');
          dot.className = 'cat-dot cat-'+c.value;
          item.appendChild(dot);
          const lbl = document.createElement('span');
          lbl.style.color = `var(--cat-${c.value})`;
          lbl.textContent = c.label;
          item.appendChild(lbl);
          item.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); });
          item.addEventListener('click', e => {
            e.stopPropagation();
            pickerCat = c.value;
            pickerStep = 'role';
            buildDropdown();
          });
          step.appendChild(item);
        });
      } else {
        const hdr = document.createElement('div');
        hdr.className = 'role-dropdown-header';
        const arrow = document.createElement('span');
        arrow.className = 'back-arrow'; arrow.textContent = '‹ ';
        const catInfo = CATEGORIES.find(c=>c.value===pickerCat);
        hdr.appendChild(arrow);
        const lbl = document.createElement('span');
        lbl.style.color = `var(--cat-${pickerCat})`;
        lbl.textContent = catInfo?.label || pickerCat;
        hdr.appendChild(lbl);
        hdr.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); });
        hdr.addEventListener('click', e => {
          e.stopPropagation();
          pickerStep = 'cat';
          buildDropdown();
        });
        step.appendChild(hdr);

        const rolesInCat = source.map((r,ri)=>({r,ri})).filter(({r})=>(r.category||'citizen')===pickerCat);
        rolesInCat.forEach(({r,ri}) => {
          const item = document.createElement('div');
          item.className = 'role-dropdown-role-item'+(ri===assignments[si]?' selected':'');
          item.textContent = r.name;
          item.style.color = `var(--cat-${pickerCat})`;
          item.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); });
          item.addEventListener('click', e => {
            e.stopPropagation();
            assignments[si] = ri;
            img.src = source[ri].img;
            img.alt = source[ri].name;
            pickerBtn.textContent = source[ri].name;
            pickerBtn.className = 'role-picker-btn cat-'+(source[ri].category||'citizen');
            closeDropdown();
          });
          step.appendChild(item);
        });
      }
      dropdown.appendChild(step);
    }

    function openDropdown(){
      // позиционируем dropdown относительно кнопки
      const rect = pickerBtn.getBoundingClientRect();
      dropdown.style.top  = (rect.bottom + 4) + 'px';
      dropdown.style.left = rect.left + 'px';
      pickerStep = 'cat';
      buildDropdown();
      dropdown.classList.add('open');
      // закрыть при клике вне
      setTimeout(() => {
        document.addEventListener('click', onOutsideClick, { once:true, capture:true });
      }, 0);
    }

    function closeDropdown(){
      dropdown.classList.remove('open');
      document.removeEventListener('click', onOutsideClick, true);
    }

    function onOutsideClick(e){
      if(!dropdown.contains(e.target) && e.target !== pickerBtn){
        closeDropdown();
      } else {
        // если клик внутри — слушаем снова
        setTimeout(() => {
          document.addEventListener('click', onOutsideClick, { once:true, capture:true });
        }, 0);
      }
    }

    pickerBtn.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); });
    pickerBtn.addEventListener('click', e => {
      e.stopPropagation();
      if(dropdown.classList.contains('open')) closeDropdown();
      else openDropdown();
    });

    document.body.appendChild(dropdown);

    pickerWrap.appendChild(pickerBtn);
    // сохраняем ссылку для cleanup при перерисовке
    pickerWrap._dropdown = dropdown;

    // теги
    const tagsArea = document.createElement('div');
    tagsArea.className='tags-area';
    const tagsPills = document.createElement('div');
    tagsPills.className='tags-pills';

    function rebuildPills(){
      tagsPills.innerHTML='';
      slotTags[si].forEach(ti=>{
        if(ti>=tagPool.length) return;
        const pill=document.createElement('span');
        pill.className='tag-pill';
        pill.textContent=tagPool[ti].name;
        const rm=document.createElement('button');
        rm.className='remove-tag'; rm.textContent='×';
        rm.addEventListener('mousedown',e=>e.stopPropagation());
        rm.addEventListener('click',e=>{
          e.stopPropagation();
          slotTags[si].delete(ti);
          rebuildPills(); rebuildAddSelect();
        });
        pill.appendChild(rm);
        tagsPills.appendChild(pill);
      });
    }

    const addTagSelect = document.createElement('select');
    addTagSelect.className='add-tag-select';

    function rebuildAddSelect(){
      addTagSelect.innerHTML='';
      const available=tagPool.filter((_,ti)=>!slotTags[si].has(ti));
      if(available.length===0){ addTagSelect.style.display='none'; return; }
      addTagSelect.style.display='';
      const ph=document.createElement('option');
      ph.value=''; ph.textContent='+ тэг…'; ph.disabled=true; ph.selected=true;
      addTagSelect.appendChild(ph);
      tagPool.forEach((tag,ti)=>{
        if(slotTags[si].has(ti)) return;
        const opt=document.createElement('option'); opt.value=ti; opt.textContent=tag.name;
        addTagSelect.appendChild(opt);
      });
    }

    addTagSelect.addEventListener('mousedown',e=>e.stopPropagation());
    addTagSelect.addEventListener('click',e=>e.stopPropagation());
    addTagSelect.addEventListener('change',()=>{
      const ti=parseInt(addTagSelect.value,10);
      if(!isNaN(ti)){ slotTags[si].add(ti); }
      rebuildPills(); rebuildAddSelect();
    });

    rebuildPills(); rebuildAddSelect();

    tagsArea.appendChild(tagsPills);
    tagsArea.appendChild(addTagSelect);

    inner.appendChild(avatarBox);
    inner.appendChild(pickerWrap);
    inner.appendChild(tagsArea);
    wrap.appendChild(inner);
    return wrap;
  }

  let isGridMode = false;

  // ── drag-and-drop swap в прямоугольном режиме ──
  let dragSlot = -1;
  let dragGhost = null;

  function rectSwap(a, b){
    [assignments[a], assignments[b]] = [assignments[b], assignments[a]];
    [alive[a],       alive[b]      ] = [alive[b],       alive[a]      ];
    [slotTags[a],    slotTags[b]   ] = [slotTags[b],    slotTags[a]   ];
    renderCircle();
  }

  function initRectDrag(wrap, si){
    wrap.style.cursor = 'grab';

    wrap.addEventListener('pointerdown', e => {
      if(e.target.closest('select, button')) return;
      dragSlot = si;
      wrap.style.cursor = 'grabbing';

      // ghost — полупрозрачная копия
      dragGhost = wrap.cloneNode(true);
      dragGhost.style.position  = 'fixed';
      dragGhost.style.pointerEvents = 'none';
      dragGhost.style.opacity   = '0.7';
      dragGhost.style.zIndex    = '999';
      dragGhost.style.width     = wrap.offsetWidth  + 'px';
      dragGhost.style.height    = wrap.offsetHeight + 'px';
      dragGhost.style.transform = 'translate(-50%,-50%) scale(1.08)';
      dragGhost.style.filter    = 'drop-shadow(0 4px 16px rgba(108,140,255,.6))';
      dragGhost.style.left      = e.clientX + 'px';
      dragGhost.style.top       = e.clientY + 'px';
      document.body.appendChild(dragGhost);

      wrap.style.opacity = '0.35';
      e.currentTarget.setPointerCapture(e.pointerId);
    });

    wrap.addEventListener('pointermove', e => {
      if(dragSlot === -1 || dragGhost === null) return;
      dragGhost.style.left = e.clientX + 'px';
      dragGhost.style.top  = e.clientY + 'px';

      // подсветить цель
      document.querySelectorAll('.circle-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const target = el?.closest('.circle-item');
      if(target && target !== wrap) target.classList.add('drag-over');
    });

    wrap.addEventListener('pointerup', e => {
      if(dragSlot === -1) return;
      document.querySelectorAll('.circle-item.drag-over').forEach(el => el.classList.remove('drag-over'));

      if(dragGhost){ dragGhost.remove(); dragGhost = null; }

      const el = document.elementFromPoint(e.clientX, e.clientY);
      const target = el?.closest('.circle-item[data-slot]');
      if(target){
        const targetSlot = parseInt(target.dataset.slot, 10);
        if(targetSlot !== dragSlot) rectSwap(dragSlot, targetSlot);
      } else {
        wrap.style.opacity = '';
      }
      dragSlot = -1;
    });
  }

  function applyRotation(){
    if(isGridMode) return;
    circleRing.style.transform = `rotate(${rotation}deg)`;
    document.querySelectorAll('.item-inner').forEach(el=>{
      el.style.transform=`translate(-50%,-50%) rotate(${-rotation}deg)`;
    });
  }

  function snapToCurrentSlot(){
    const n=Math.max(1,count);
    rotation = 90 - (360/n)*currentSlot;
    applyRotation();
  }

  const lockBtn = document.getElementById('lockBtn');
  let locked = false;
  lockBtn.addEventListener('click', () => {
    locked = !locked;
    document.body.classList.toggle('locked', locked);
    lockBtn.classList.toggle('active', locked);
    lockBtn.textContent = locked ? '🔒 Просмотр' : '🔓 Редактирование';
    lockBtn.title = locked ? 'Включить редактирование' : 'Выключить редактирование';
    if(locked) document.body.classList.remove('menu-open');
  });

  // ── бургер-меню ──
  const burgerBtn = document.getElementById('burgerBtn');
  const overlay   = document.getElementById('overlay');

  function toggleMenu(){ document.body.classList.toggle('menu-open'); }
  function closeMenu(){  document.body.classList.remove('menu-open'); }

  burgerBtn.addEventListener('click', toggleMenu);
  overlay.addEventListener('click', closeMenu);
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeMenu(); });

  const zoomInBtn  = document.getElementById('zoomIn');
  const zoomOutBtn = document.getElementById('zoomOut');
  const circleWrap = document.getElementById('circleWrap');

  let zoom = 1;
  const ZOOM_STEP = 0.15;
  const ZOOM_MIN  = 0.3;
  const ZOOM_MAX  = 2.5;

  function applyZoom(){
    circleWrap.style.transform = `scale(${zoom})`;
    renderCircle();
  }
  zoomInBtn.addEventListener('click',  () => { zoom = Math.min(ZOOM_MAX, parseFloat((zoom+ZOOM_STEP).toFixed(2))); applyZoom(); });
  zoomOutBtn.addEventListener('click', () => { zoom = Math.max(ZOOM_MIN, parseFloat((zoom-ZOOM_STEP).toFixed(2))); applyZoom(); });

  const RECT_STEP = 40;
  document.getElementById('rectWPlus') .addEventListener('click', () => { rectWOffset += RECT_STEP; renderCircle(); });
  document.getElementById('rectWMinus').addEventListener('click', () => { rectWOffset -= RECT_STEP; renderCircle(); });
  document.getElementById('rectHPlus') .addEventListener('click', () => { rectHOffset += RECT_STEP; renderCircle(); });
  document.getElementById('rectHMinus').addEventListener('click', () => { rectHOffset -= RECT_STEP; renderCircle(); });
  document.getElementById('rectYPlus') .addEventListener('click', () => { rectYOffset += RECT_STEP; renderCircle(); });
  document.getElementById('rectYMinus').addEventListener('click', () => { rectYOffset -= RECT_STEP; renderCircle(); });

  // зум колесом мыши над сценой
  document.getElementById('stage').addEventListener('wheel', e => {
    e.preventDefault();
    zoom = e.deltaY < 0
      ? Math.min(ZOOM_MAX, parseFloat((zoom+ZOOM_STEP).toFixed(2)))
      : Math.max(ZOOM_MIN, parseFloat((zoom-ZOOM_STEP).toFixed(2)));
    applyZoom();
  }, { passive: false });

  // перепроверяем при ресайзе окна
  window.addEventListener('resize', () => { renderCircle(); });

  rotLeftBtn.addEventListener('click',()=>{
    currentSlot=(currentSlot-1+count)%count; snapToCurrentSlot();
  });
  rotRightBtn.addEventListener('click',()=>{
    currentSlot=(currentSlot+1)%count; snapToCurrentSlot();
  });

  applyCountBtn.addEventListener('click',()=>{
    const v=parseInt(countInput.value,10);
    count=isNaN(v)||v<1?1:v;
    currentSlot=0;
    // авто-подбор радиуса если нужно
    const sc=scaleForCount(count);
    const rMin=minRadius(count,sc.iw);
    if(radius < rMin){
      radius=rMin;
      radiusInput.value=rMin;
    }
    renderCircle();
  });
  countInput.addEventListener('keydown',e=>{ if(e.key==='Enter') applyCountBtn.click(); });

  radiusInput.addEventListener('input',()=>{
    radius=parseInt(radiusInput.value,10);
    renderCircle();
  });

  addItemBtn.addEventListener('click',()=>{
    pool.push({name:'Новая роль',img:placeholderImg('?')});
    renderItemsList(); renderCircle();
  });
  fileInput.addEventListener('change',e=>{
    const files=Array.from(e.target.files||[]);
    let pending=files.length; if(!pending) return;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        pool.push({name:file.name.replace(/\.[^/.]+$/,''),img:ev.target.result});
        if(--pending===0){ renderItemsList(); renderCircle(); }
      };
      reader.readAsDataURL(file);
    });
    fileInput.value='';
  });

  addTagBtn.addEventListener('click',()=>{
    tagPool.push({name:'Новый тэг'});
    renderTagsList(); renderCircle();
  });

  loadJsonBtn.addEventListener('click',()=>{
    try{
      const parsed=JSON.parse(jsonArea.value);
      // Новый формат: { roles:[...], tags:[...] }
      // Старый формат: [...] (массив ролей)
      const rolesArr = Array.isArray(parsed) ? parsed : (parsed.roles || []);
      const tagsArr  = Array.isArray(parsed) ? null   : (parsed.tags  || null);
      if(!Array.isArray(rolesArr)) throw new Error('roles должен быть массивом');
      pool = rolesArr.map(it=>({
        name:     it.name||it.role||'—',
        img:      it.img||it.image||placeholderImg('?'),
        category: it.category||'citizen',
      }));
      if(tagsArr && Array.isArray(tagsArr)){
        tagPool = tagsArr.map(t => ({ name: typeof t==='string' ? t : (t.name||'—') }));
        renderTagsList();
      }
      renderItemsList(); renderCircle();
    }catch(err){ alert('Ошибка JSON: '+err.message); }
  });
  exportJsonBtn.addEventListener('click',()=>{
    const data = {
      roles: pool.map(it=>({ name:it.name, category:it.category||'citizen', img:it.img })),
      tags:  tagPool.map(t=>({ name:t.name })),
    };
    jsonArea.value = JSON.stringify(data, null, 2);
  });

  resetBtn.addEventListener('click',()=>{
    pool=[
      {name:"Шериф",     img:placeholderImg("Ш"), category:"citizen"},
      {name:"Доктор",    img:placeholderImg("Д"), category:"citizen"},
      {name:"Маг",       img:placeholderImg("М"), category:"citizen"},
      {name:"Воин",      img:placeholderImg("В"), category:"citizen"},
      {name:"Разведчик", img:placeholderImg("Р"), category:"outcast"},
      {name:"Торговец",  img:placeholderImg("Т"), category:"outcast"},
      {name:"Кузнец",    img:placeholderImg("К"), category:"minion"},
      {name:"Жрец",      img:placeholderImg("Ж"), category:"demon"},
    ];
    tagPool=[{name:"Отравлен"},{name:"Пьяница"},{name:"Проклят"},{name:"Подозреваемый"}];
    count=6; radius=260; rotation=90; currentSlot=0;
    assignments=[]; alive=[]; slotTags=[];
    rectWOffset=0; rectHOffset=0; rectYOffset=0;
    countInput.value=6; radiusInput.value=260;
    renderItemsList(); renderTagsList(); renderCircle();
  });

  // ── пресеты ──
  // Список пресетов встроен прямо сюда — работает и локально (file://) и на GitHub Pages.
  // Чтобы добавить свой пресет: добавь объект в PRESETS и положи json-файл в папку presets/.
  const PRESETS = [
    {
      name: 'Классическая мафия',
      file: 'presets/classic.json',
      // Встроенные данные — используются когда fetch недоступен (file://)
      data: {"roles":[{"name":"Шериф","category":"citizen"},{"name":"Доктор","category":"citizen"},{"name":"Детектив","category":"citizen"},{"name":"Горожанин","category":"citizen"},{"name":"Горожанин","category":"citizen"},{"name":"Горожанин","category":"citizen"},{"name":"Мафия","category":"minion"},{"name":"Мафия","category":"minion"},{"name":"Дон","category":"demon"},{"name":"Маньяк","category":"outcast"}],"tags":[{"name":"Подозреваемый"},{"name":"Проверен"},{"name":"Алиби"},{"name":"Под прицелом"}]}
    },
    {
      name: 'Тёмное средневековье',
      file: 'presets/medieval.json',
      data: {"roles":[{"name":"Рыцарь","category":"citizen"},{"name":"Жрец","category":"citizen"},{"name":"Маг","category":"citizen"},{"name":"Охотник","category":"citizen"},{"name":"Крестьянин","category":"citizen"},{"name":"Крестьянин","category":"citizen"},{"name":"Изгой","category":"outcast"},{"name":"Предатель","category":"minion"},{"name":"Культист","category":"minion"},{"name":"Демон","category":"demon"},{"name":"Тёмный лорд","category":"demon"}],"tags":[{"name":"Проклят"},{"name":"Отравлен"},{"name":"Благословлён"},{"name":"Помечен"},{"name":"Пьяница"}]}
    },
    {
      name: 'Sci-Fi колония',
      file: 'presets/scifi.json',
      data: {"roles":[{"name":"Капитан","category":"citizen"},{"name":"Медик","category":"citizen"},{"name":"Инженер","category":"citizen"},{"name":"Пилот","category":"citizen"},{"name":"Колонист","category":"citizen"},{"name":"Колонист","category":"citizen"},{"name":"Дезертир","category":"outcast"},{"name":"Шпион","category":"minion"},{"name":"Диверсант","category":"minion"},{"name":"Чужой","category":"demon"}],"tags":[{"name":"Заражён"},{"name":"Изолирован"},{"name":"Под слежкой"},{"name":"Повреждён"},{"name":"Агент"}]}
    },
  ];

  const presetSelect  = document.getElementById('presetSelect');
  const presetLoadBtn = document.getElementById('presetLoadBtn');
  const presetStatus  = document.getElementById('presetStatus');

  function setPresetStatus(msg, isError){
    presetStatus.textContent = msg;
    presetStatus.style.color = isError ? 'var(--accent2)' : 'var(--muted)';
  }

  // activePresets — текущий список (PRESETS по умолчанию, может быть заменён из manifest.json)
  let activePresets = PRESETS;

  function populatePresetSelect(list){
    presetSelect.innerHTML = '<option value="">— выбери пресет —</option>';
    list.forEach((p, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = p.name;
      presetSelect.appendChild(opt);
    });
    setPresetStatus(`Пресетов: ${list.length}`);
  }

  // Сразу показываем встроенный список
  populatePresetSelect(activePresets);

  // Пробуем подгрузить manifest.json — если доступен, он перезаписывает список
  // (работает на GitHub Pages / localhost; на file:// молча игнорируется)
  fetch('manifest.json')
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(manifest => {
      if(!Array.isArray(manifest.presets) || manifest.presets.length === 0) return;
      // Пресеты из манифеста: ищем встроенный data по совпадению file, остальным data=undefined
      activePresets = manifest.presets.map(p => {
        const builtin = PRESETS.find(b => b.file === p.file);
        return { name: p.name, file: p.file, data: builtin ? builtin.data : undefined };
      });
      populatePresetSelect(activePresets);
      setPresetStatus(`Из manifest.json: ${activePresets.length} пресетов`);
    })
    .catch(() => { /* manifest.json недоступен — оставляем встроенный список */ });

  function applyPresetData(parsed, label){
    const rolesArr = Array.isArray(parsed) ? parsed : (parsed.roles || []);
    const tagsArr  = Array.isArray(parsed) ? null   : (parsed.tags  || null);
    if(!Array.isArray(rolesArr)) throw new Error('roles должен быть массивом');
    pool = rolesArr.map(it=>({
      name:     it.name||it.role||'—',
      img:      it.img||it.image||placeholderImg('?'),
      category: it.category||'citizen',
    }));
    if(tagsArr && Array.isArray(tagsArr)){
      tagPool = tagsArr.map(t => ({ name: typeof t==='string' ? t : (t.name||'—') }));
      renderTagsList();
    }
    renderItemsList(); renderCircle();
    setPresetStatus(`✓ Загружен: ${label}`);
  }

  presetLoadBtn.addEventListener('click', async () => {
    const idx = presetSelect.value;
    if(idx === ''){ setPresetStatus('Сначала выбери пресет', true); return; }
    const preset = activePresets[parseInt(idx)];
    presetLoadBtn.textContent = '…';
    presetLoadBtn.disabled = true;
    try {
      // Пробуем загрузить свежий файл (работает на GitHub Pages / localhost)
      const res = await fetch(preset.file);
      if(!res.ok) throw new Error('fetch failed');
      const parsed = await res.json();
      applyPresetData(parsed, preset.name);
    } catch(e) {
      // Fallback: встроенные данные (работает локально через file://)
      if(preset.data) applyPresetData(preset.data, preset.name + ' (встроен)');
      else setPresetStatus('Файл недоступен локально и встроенных данных нет', true);
    } finally {
      presetLoadBtn.textContent = 'Загрузить';
      presetLoadBtn.disabled = false;
    }
  });

  // init
  countInput.value=count; radiusInput.value=radius;
  renderItemsList(); renderTagsList(); renderCircle();

})();
</script>
</body>
</html>
